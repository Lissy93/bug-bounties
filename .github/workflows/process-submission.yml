name: 🆕 Process program submission

on:
  issues:
    types: [opened, labeled]

jobs:
  process:
    if: >-
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'program-submission'))
      || (github.event.action == 'labeled' && github.event.label.name == 'program-submission')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r lib/requirements.txt

      - name: Process submission
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: python lib/process-submission.py

      - name: Create PR
        if: steps.process.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          BRANCH: ${{ steps.process.outputs.branch }}
          COMPANY: ${{ steps.process.outputs.company }}
          PR_BODY: ${{ steps.process.outputs.pr_body }}
        run: |
          # Resolve co-author info for the issue opener
          AUTHOR_LOGIN="${{ github.event.issue.user.login }}"
          AUTHOR_NAME=$(gh api "/users/${AUTHOR_LOGIN}" --jq '.name // empty' 2>/dev/null || true)
          AUTHOR_NAME="${AUTHOR_NAME:-$AUTHOR_LOGIN}"
          AUTHOR_EMAIL=$(gh api "/users/${AUTHOR_LOGIN}" --jq '.email // empty' 2>/dev/null || true)
          AUTHOR_EMAIL="${AUTHOR_EMAIL:-${AUTHOR_LOGIN}@users.noreply.github.com}"

          git config user.name "Liss-Bot"
          git config user.email "alicia-gh-bot@mail.as93.net"
          git checkout -b "$BRANCH"
          git add independent-programs.yml
          git commit -m "$(printf 'Add program: %s\n\nCo-Authored-By: %s <%s>' "$COMPANY" "$AUTHOR_NAME" "$AUTHOR_EMAIL")"
          git push -u origin "$BRANCH" --force

          # Create PR, or update the existing one if re-triggered
          if gh pr view "$BRANCH" --json number -q .number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "Add program: $COMPANY" --body "$PR_BODY"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "Add program: $COMPANY" \
              --body "$PR_BODY"
          fi

      - name: Comment on issue (success)
        if: steps.process.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH: ${{ steps.process.outputs.branch }}
        run: |
          PR_URL=$(gh pr view "$BRANCH" --json url -q .url)
          BODY="Hey @${{ github.event.issue.user.login }}, thank you for your submission!"
          BODY="${BODY}"$'\n'"I've created a PR at ${PR_URL} to get this merged in 😊"
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          # gh issue close "$ISSUE_NUMBER"

      - name: Comment on issue (failure)
        if: steps.process.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ERROR_MESSAGE: ${{ steps.process.outputs.error_message }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "$(cat <<'EOF'
          Hey @${{ github.event.issue.user.login }} - thanks for your submission!
          But it looks like there were some validation errors in the content you entered.

          ${{ steps.process.outputs.error_message }}

          Please either close/re-open the issue, or tag a maintainer to take a look
          EOF
          )"
